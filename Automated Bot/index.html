<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Video Pipeline</title>
  </head>
  <body class="bg-gray-950 text-gray-100">
    <div id="root">
      <div id="app-loader" style="display:flex;align-items:center;justify-content:center;height:100vh;background:#030712;color:#9ca3af;font-family:system-ui">
        <div>
          <div style="border:3px solid #1f2937;border-top-color:#3b82f6;border-radius:50%;width:32px;height:32px;animation:spin 0.8s linear infinite;margin:0 auto 12px"></div>
          <p>Loading Video Pipeline...</p>
        </div>
      </div>
      <style>#app-loader{opacity:1;transition:opacity .3s}@keyframes spin{to{transform:rotate(360deg)}}</style>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
