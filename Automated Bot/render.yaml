services:
  - type: web
    name: video-pipeline
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: node server/proxy.js
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: VITE_CLAUDE_API_KEY
        sync: false
      - key: VITE_NANOBANANA_API_KEY
        sync: false
      - key: VITE_KLING_ACCESS_KEY
        sync: false
      - key: VITE_KLING_SECRET_KEY
        sync: false
      - key: VITE_GEMINI_API_KEY
        sync: false
      - key: VITE_ELEVENLABS_API_KEY
        sync: false
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_ANON_KEY
        sync: false
